<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#d94687" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="专属祝福" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>专属祝福小屋</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <style>
    :root {
      --ink: #2f2a35;
      --muted: #746979;
      --paper: rgba(255, 255, 255, .88);
      --line: rgba(47, 42, 53, .13);
      --accent: #d94687;
      --accent-2: #2f9e8f;
      --warm: #f4b95f;
      --cool: #7b8fe8;
      --shadow: 0 18px 54px rgba(65, 49, 78, .18);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Serif SC", "Songti SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 255, 255, .72), transparent 24rem),
        linear-gradient(135deg, #fff2f6 0%, #edf9f3 42%, #fff8e4 100%);
      overflow-x: hidden;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      position: relative;
      min-height: 92vh;
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(330px, .78fr);
      gap: 34px;
      align-items: center;
      padding: 38px 0 30px;
    }

    .hero > *, .content > * {
      min-width: 0;
    }

    .hero::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.74), rgba(255,255,255,.26)),
        url("https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=1800&q=80");
      background-size: cover;
      background-position: center;
      filter: saturate(.98);
    }

    .hero::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,.72)),
        radial-gradient(circle at 75% 16%, rgba(47, 158, 143, .18), transparent 22rem),
        radial-gradient(circle at 18% 76%, rgba(217, 70, 135, .16), transparent 20rem);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .68);
      color: #6b4058;
      font-size: 14px;
      letter-spacing: 1px;
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 24px 0 14px;
      max-width: 720px;
      font-size: clamp(42px, 7vw, 84px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 0;
      color: #514857;
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.9;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      max-width: 650px;
      margin-top: 28px;
    }

    .stat {
      min-height: 86px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.68);
      backdrop-filter: blur(14px);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .panel {
      border: 1px solid rgba(255,255,255,.7);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .generator {
      padding: 22px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .date-pill {
      white-space: nowrap;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(217,70,135,.1);
      color: #a73568;
      font-size: 12px;
    }

    .field {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
    }

    .field span {
      color: var(--muted);
      font-size: 13px;
    }

    .name-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 116px;
      gap: 10px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.74);
      color: var(--ink);
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    input, select {
      height: 48px;
      padding: 0 14px;
    }

    textarea {
      min-height: 126px;
      resize: vertical;
      padding: 13px 14px;
      line-height: 1.8;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(217,70,135,.58);
      box-shadow: 0 0 0 4px rgba(217,70,135,.12);
      background: rgba(255,255,255,.93);
    }

    .primary, .secondary, .ghost {
      min-height: 46px;
      border-radius: 14px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .16s, box-shadow .16s, background .16s;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 26px rgba(217,70,135,.24);
      font-weight: 700;
    }

    .secondary {
      color: #394047;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .ghost {
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
    }

    .primary:hover, .secondary:hover, .ghost:hover {
      transform: translateY(-1px);
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 4px 0 16px;
    }

    .theme-btn {
      min-width: 0;
      min-height: 58px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.58);
      color: var(--ink);
    }

    .theme-btn.active {
      border-color: rgba(217,70,135,.55);
      box-shadow: inset 0 0 0 2px rgba(217,70,135,.12);
      background: rgba(255,255,255,.9);
    }

    .result {
      margin-top: 18px;
      padding: 18px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,255,255,.62)),
        linear-gradient(135deg, rgba(217,70,135,.13), rgba(47,158,143,.12));
      border: 1px solid rgba(255,255,255,.78);
    }

    .holiday-banner {
      display: none;
      margin: 0 0 14px;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.82);
      background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,255,255,.62));
      color: var(--ink);
    }

    .holiday-banner.show {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .holiday-icon {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(217,70,135,.11);
      font-size: 25px;
    }

    .holiday-title {
      font-weight: 700;
      margin-bottom: 2px;
    }

    .holiday-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .wish {
      margin: 16px 0 8px;
      font-size: clamp(26px, 3.6vw, 38px);
      line-height: 1.42;
      font-weight: 700;
      letter-spacing: 0;
    }

    .wish-en {
      margin: 0;
      color: #6a596d;
      line-height: 1.8;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      color: #5a4f60;
      background: rgba(255,255,255,.68);
      border: 1px solid var(--line);
      font-size: 13px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
      margin-top: 14px;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(320px, 1.1fr);
      gap: 18px;
      align-items: start;
      padding: 0 0 56px;
    }

    .section {
      padding: 20px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .fortune-list {
      display: grid;
      gap: 10px;
    }

    .fortune {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.58);
    }

    .fortune b {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 13px;
      background: rgba(217,70,135,.1);
      font-size: 24px;
    }

    .fortune strong {
      display: block;
      margin-bottom: 3px;
      font-size: 15px;
    }

    .fortune span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .diary-form {
      display: grid;
      gap: 10px;
    }

    .diary-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) repeat(4, 110px);
      gap: 10px;
    }

    .photo-input {
      display: none;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
      gap: 9px;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.55);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      min-height: 24px;
      width: 24px;
      padding: 0;
      border-radius: 999px;
      color: #fff;
      background: rgba(38,35,43,.62);
    }

    .record-photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .record-photos img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .records {
      display: grid;
      gap: 10px;
      max-height: 460px;
      overflow: auto;
      padding-right: 4px;
      margin-top: 16px;
    }

    .record {
      padding: 13px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.62);
    }

    .record-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .record p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.75;
    }

    .tiny {
      min-height: 30px;
      padding: 0 9px;
      border-radius: 10px;
      color: #a73568;
      background: rgba(217,70,135,.09);
    }

    .empty {
      padding: 28px 12px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.38);
    }

    .favorites {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 16px);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      padding: 10px 16px;
      border-radius: 999px;
      color: #fff;
      background: rgba(38, 35, 43, .88);
      transition: opacity .2s, transform .2s;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .album-sheet {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(31, 28, 36, .72);
    }

    .album-sheet.show {
      display: grid;
    }

    .album-panel {
      width: min(430px, 100%);
      max-height: 92vh;
      overflow: auto;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,.96);
      box-shadow: var(--shadow);
    }

    .album-panel img {
      display: block;
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .album-panel h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .album-panel p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .album-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .petal {
      position: fixed;
      top: -40px;
      z-index: 4;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translate3d(var(--x), 108vh, 0) rotate(420deg);
        opacity: .08;
      }
    }

    body.summer {
      --accent: #159a8d;
      --accent-2: #e3a536;
      background: linear-gradient(135deg, #eafaf6, #fff8d8);
    }

    body.autumn {
      --accent: #b7652f;
      --accent-2: #bc3f56;
      background: linear-gradient(135deg, #fff4dc, #fae6e2);
    }

    body.winter {
      --accent: #5275d8;
      --accent-2: #54a7bd;
      background: linear-gradient(135deg, #eef5ff, #f7eefb);
    }

    @media (max-width: 860px) {
      .hero, .content {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
        padding-top: 26px;
      }

      h1 {
        font-size: clamp(34px, 9.2vw, 40px);
        word-break: keep-all;
      }

      h1 span {
        display: block;
      }

      .lead {
        font-size: 17px;
      }

      .panel-title {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero-stats {
        grid-template-columns: 1fr;
      }

      .name-row, .actions, .diary-tools {
        grid-template-columns: 1fr;
      }

      .theme-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="brand">✦ 专属祝福小屋 · Daily Blessing</div>
        <h1><span>给一个名字，</span><span>生成一天的温柔。</span></h1>
        <p class="lead">输入 TA 的名字，页面会按今天的日期和季节生成固定祝福、幸运小签、心情日记与收藏记录。所有内容保存在当前浏览器里，适合做成私人的小礼物。</p>
        <div class="hero-stats" aria-label="功能概览">
          <div class="stat"><strong>4</strong><span>春夏秋冬主题，可手动切换</span></div>
          <div class="stat"><strong>∞</strong><span>任意名字生成专属文案</span></div>
          <div class="stat"><strong>本地</strong><span>日记和收藏不会上传</span></div>
        </div>
      </div>

      <section class="panel generator" aria-label="祝福生成器">
        <div class="panel-title">
          <h2>今日祝福</h2>
          <div class="date-pill" id="todayText"></div>
        </div>

        <label class="field">
          <span>名字</span>
          <div class="name-row">
            <input id="nameInput" maxlength="16" autocomplete="off" placeholder="例如：梁月" />
            <button class="primary" id="randomBtn" type="button">随机</button>
          </div>
        </label>

        <label class="field">
          <span>主题</span>
          <select id="toneSelect">
            <option value="warm">温柔鼓励</option>
            <option value="bright">明亮好运</option>
            <option value="quiet">安静陪伴</option>
            <option value="brave">勇气满格</option>
          </select>
        </label>

        <div class="theme-grid" id="themeGrid" aria-label="四季主题"></div>

        <button class="primary" id="generateBtn" type="button" style="width:100%">生成专属祝福</button>

        <div class="holiday-banner" id="holidayBanner" aria-live="polite">
          <div class="holiday-icon" id="holidayIcon"></div>
          <div>
            <div class="holiday-title" id="holidayTitle"></div>
            <div class="holiday-sub" id="holidaySub"></div>
          </div>
        </div>

        <article class="result" id="resultCard">
          <div class="result-top">
            <span id="resultMeta">等待一个名字</span>
            <span id="luckyNumber">No. 000</span>
          </div>
          <div class="wish" id="wishText">愿今天的风，把好消息轻轻带到你身边。</div>
          <p class="wish-en" id="wishEn">May good news find its way to you today.</p>
          <div class="chips" id="chips"></div>
          <div class="actions">
            <button class="secondary" id="copyBtn" type="button">复制</button>
            <button class="secondary" id="shareBtn" type="button">分享到便签</button>
            <button class="secondary" id="saveWishImageBtn" type="button">保存到相册</button>
            <button class="ghost" id="saveBtn" type="button">收藏</button>
          </div>
          <button class="ghost" id="exportBtn" type="button" style="width:100%;margin-top:9px">导出备份</button>
        </article>
      </section>
    </section>

    <section class="content">
      <section class="panel section">
        <h2>幸运小签</h2>
        <div class="fortune-list" id="fortuneList"></div>
        <div class="favorites" id="favorites"></div>
      </section>

      <section class="panel section">
        <div class="panel-title">
          <h2>心情日记</h2>
          <button class="ghost" id="clearAllBtn" type="button">清空记录</button>
        </div>
        <div class="diary-form">
          <textarea id="diaryText" placeholder="写下今天的一点点心情，或把这份祝福送给谁。"></textarea>
          <input class="photo-input" id="photoInput" type="file" accept="image/*" multiple />
          <div class="photo-grid" id="photoGrid"></div>
          <div class="diary-tools">
            <button class="primary" id="saveDiaryBtn" type="button">保存日记</button>
            <button class="secondary" id="addPhotoBtn" type="button">上传图片</button>
            <button class="secondary" id="shareDiaryBtn" type="button">分享日记</button>
            <button class="secondary" id="saveDiaryImageBtn" type="button">保存到相册</button>
            <button class="secondary" id="clearDiaryBtn" type="button">清空输入</button>
          </div>
        </div>
        <div class="records" id="records"></div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="album-sheet" id="albumSheet" aria-hidden="true">
    <div class="album-panel" role="dialog" aria-modal="true" aria-labelledby="albumTitle">
      <h2 id="albumTitle">保存到相册</h2>
      <p>如果没有自动出现“保存图像”，请长按下方图片，选择保存到照片/相册。</p>
      <img id="albumPreview" alt="生成的保存图片" />
      <div class="album-actions">
        <button class="primary" id="albumShareBtn" type="button">打开保存面板</button>
        <button class="secondary" id="albumCloseBtn" type="button">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const seasons = {
      spring: { label: "春", icon: "🌸", words: ["新芽", "花信", "轻风"], particles: ["🌸", "🌷", "💗"] },
      summer: { label: "夏", icon: "🍉", words: ["晴光", "汽水", "晚风"], particles: ["🍃", "✨", "🌿"] },
      autumn: { label: "秋", icon: "🍁", words: ["桂香", "金色", "丰收"], particles: ["🍁", "🍂", "🌰"] },
      winter: { label: "冬", icon: "❄️", words: ["雪光", "热茶", "拥抱"], particles: ["❄️", "☁️", "🤍"] }
    };

    const holidays = {

    function hashText(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return Math.abs(hash >>> 0);
    }

    }

    function dateKey() {

    function createPosterCanvas({ title, subtitle, body, footer }) {
      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = 1600;
      const ctx = canvas.getContext("2d");
      paintPosterBase(ctx, canvas.width, canvas.height);
      drawText(ctx, title, 96, 150, 52, 1000, 1.2, "700");
      drawText(ctx, subtitle, 96, 230, 30, 1000, 1.4, "400", "#746979");
      const used = drawText(ctx, body, 96, 390, 70, 1000, 1.36, "700", "#2f2a35");
      drawText(ctx, footer, 96, Math.min(1320, used + 72), 30, 1000, 1.5, "400", "#6a596d");
      drawText(ctx, "专属祝福小屋", 96, 1460, 28, 1000, 1.4, "700", "#d94687");
      return canvas;
    }

    async function createDiaryPosterCanvas({ title, subtitle, body, photos }) {
      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = photos && photos.length ? 1800 : 1500;
      const ctx = canvas.getContext("2d");
      paintPosterBase(ctx, canvas.width, canvas.height);
      drawText(ctx, title, 96, 140, 50, 1000, 1.2, "700");
      drawText(ctx, subtitle, 96, 218, 30, 1000, 1.4, "400", "#746979");
      let y = drawText(ctx, body, 96, 340, 44, 1000, 1.65, "400", "#2f2a35");
      if (photos && photos.length) {
        y += 48;
        await drawPosterPhotos(ctx, photos, 96, y, 1000);
      }
      drawText(ctx, "保存自专属祝福小屋", 96, canvas.height - 92, 28, 1000, 1.4, "700", "#d94687");
      return canvas;
    }

    function paintPosterBase(ctx, width, height) {
      const bg = ctx.createLinearGradient(0, 0, width, height);
      bg.addColorStop(0, "#fff2f6");
      bg.addColorStop(.52, "#edf9f3");
      bg.addColorStop(1, "#fff8e4");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "rgba(255,255,255,.76)";
      roundRect(ctx, 60, 60, width - 120, height - 120, 52);
      ctx.fill();
      ctx.strokeStyle = "rgba(47,42,53,.1)";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = "rgba(47,158,143,.13)";
      ctx.beginPath();
      ctx.arc(width - 160, 180, 150, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(217,70,135,.12)";
      ctx.beginPath();
      ctx.arc(170, height - 180, 170, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawText(ctx, text, x, y, size, maxWidth, lineHeight = 1.45, weight = "400", color = "#2f2a35") {
      ctx.fillStyle = color;
      ctx.font = `${weight} ${size}px "Noto Serif SC", "Microsoft YaHei", "PingFang SC", serif`;
      ctx.textBaseline = "top";
      const lines = wrapText(ctx, String(text || ""), maxWidth);
      lines.forEach((line, index) => {
        ctx.fillText(line, x, y + index * size * lineHeight);
      });
      return y + lines.length * size * lineHeight;
    }

    function wrapText(ctx, text, maxWidth) {
      const lines = [];
      const paragraphs = text.split("\n");
      paragraphs.forEach((paragraph) => {
        let line = "";
        Array.from(paragraph).forEach((char) => {
          const test = line + char;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = char;
          } else {
            line = test;
          }
        });
        lines.push(line || " ");
      });
      return lines;
    }

    async function drawPosterPhotos(ctx, photos, x, y, maxWidth) {
      const gap = 18;
      const columns = photos.length === 1 ? 1 : 2;
      const size = columns === 1 ? Math.min(620, maxWidth) : (maxWidth - gap) / 2;
      for (let i = 0; i < Math.min(photos.length, 4); i++) {
        const img = await loadImage(photos[i]);
        const px = x + (i % columns) * (size + gap);
        const py = y + Math.floor(i / columns) * (size + gap);
        ctx.save();
        roundRect(ctx, px, py, size, size, 30);
        ctx.clip();
        drawCoverImage(ctx, img, px, py, size, size);
        ctx.restore();
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawCoverImage(ctx, img, x, y, width, height) {
      const scale = Math.max(width / img.width, height / img.height);
      const drawWidth = img.width * scale;
      const drawHeight = img.height * scale;
      ctx.drawImage(img, x + (width - drawWidth) / 2, y + (height - drawHeight) / 2, drawWidth, drawHeight);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve) => canvas.toBlob(resolve, "image/png", 1));

    async function handlePhotos(event) {
      const files = Array.from(event.target.files || []).filter((file) => file.type.startsWith("image/"));

      if (state.diaryPhotos.length + files.length > 9) {

      for (const file of files) {
        const dataUrl = await imageToDataUrl(file);
        state.diaryPhotos.push(dataUrl);
      }
      event.target.value = "";
      renderPhotoGrid();
    }

    function imageToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxSide = 1280;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", .82));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

      list.unshift({ id: Date.now(), date: dateLabel() + " " + timeLabel(), text, photos: state.diaryPhotos.slice() });
      try {
        storageSet("blessing:diary", list.slice(0, 60));
      } catch (error) {
        showToast("图片太多，本地空间不够了");
        return;
      }
      $("diaryText").value = "";
      state.diaryPhotos = [];
      renderPhotoGrid();
      renderDiary();
      showToast("日记已保存");
    }

    function timeLabel() {
      const now = new Date();
      return `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    }

    function renderDiary() {
      const list = storageGet("blessing:diary");
      if (!list.length) {
        $("records").innerHTML = `<div class="empty">还没有日记。今天可以从一句“我很好”开始。</div>`;
        return;
      }
      $("records").innerHTML = list.map((item) => `
        <article class="record">
          <div class="record-head">
            <span>${item.date}</span>
            <span>
              <button class="tiny" data-diary-image="${item.id}">存图</button>
              <button class="tiny" data-diary="${item.id}">删除</button>
            </span>
          </div>
          <p>${escapeHtml(item.text)}</p>
          ${renderRecordPhotos(item.photos)}
        </article>
      `).join("");
      document.querySelectorAll("[data-diary-image]").forEach((button) => {
        button.addEventListener("click", () => saveDiaryRecordImage(button.dataset.diaryImage));
      });
      document.querySelectorAll("[data-diary]").forEach((button) => {
        button.addEventListener("click", () => {
          storageSet("blessing:diary", storageGet("blessing:diary").filter((item) => String(item.id) !== button.dataset.diary));
          renderDiary();
        });
      });
    }

    function renderRecordPhotos(photos) {
      if (!photos || !photos.length) return "";
      return `<div class="record-photos">${photos.map((src, index) => `<img src="${src}" alt="已保存图片 ${index + 1}" />`).join("")}</div>`;
    }

    function clearAll() {
      if (!confirm("确定清空所有日记和收藏吗？")) return;
      localStorage.removeItem("blessing:diary");
      localStorage.removeItem("blessing:favorites");
      renderDiary();
      renderFavorites();
      showToast("已清空");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function bloom() {
      const season = seasons[state.season];
      for (let i = 0; i < 12; i++) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.textContent = season.particles[i % season.particles.length];
        petal.style.left = `${Math.random() * 100}vw`;
        petal.style.setProperty("--x", `${Math.random() * 120 - 60}px`);
        petal.style.animationDuration = `${3.5 + Math.random() * 2.5}s`;
        petal.style.fontSize = `${16 + Math.random() * 14}px`;
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 6500);
      }
    }

    $("todayText").textContent = dateLabel();
    renderThemes();
    setSeason(state.season);
    renderHoliday(todayHoliday());
    renderFortunes(12);
    renderDiary();
    renderFavorites();

    $("generateBtn").addEventListener("click", generate);
    $("nameInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") generate();
    });
    $("randomBtn").addEventListener("click", () => {
      $("nameInput").value = names[Math.floor(Math.random() * names.length)];
      generate();
    });
    $("copyBtn").addEventListener("click", copyWish);
    $("shareBtn").addEventListener("click", shareWish);
    $("saveWishImageBtn").addEventListener("click", saveWishImage);
    $("saveBtn").addEventListener("click", saveFavorite);
    $("exportBtn").addEventListener("click", exportData);
    $("addPhotoBtn").addEventListener("click", pickPhotos);
    $("photoInput").addEventListener("change", handlePhotos);
    $("shareDiaryBtn").addEventListener("click", shareDiaryDraft);
    $("saveDiaryImageBtn").addEventListener("click", saveDiaryDraftImage);
    $("saveDiaryBtn").addEventListener("click", saveDiary);
    $("clearDiaryBtn").addEventListener("click", () => {
      $("diaryText").value = "";
      state.diaryPhotos = [];
      renderPhotoGrid();
      showToast("输入已清空");
    });
    $("clearAllBtn").addEventListener("click", clearAll);
    $("albumShareBtn").addEventListener("click", shareAlbumPreview);
    $("albumCloseBtn").addEventListener("click", closeAlbumPreview);
    $("albumSheet").addEventListener("click", (event) => {
      if (event.target === $("albumSheet")) closeAlbumPreview();
    });

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
